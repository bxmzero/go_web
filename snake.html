<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇小游戏</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2937, #0b1020 60%);
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        padding: 18px;
      }

      .game {
        width: min(94vw, 560px);
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
        padding: 18px;
      }

      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .title {
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .scores {
        display: flex;
        gap: 14px;
        font-weight: 700;
        color: #cbd5e1;
      }

      .scores span strong {
        color: #86efac;
      }

      canvas {
        width: 100%;
        aspect-ratio: 1;
        background: #0f172a;
        border-radius: 10px;
        border: 1px solid rgba(134, 239, 172, 0.35);
      }

      .toolbar {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #475569;
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }

      button:hover {
        background: #334155;
      }

      .status {
        margin-top: 8px;
        min-height: 22px;
        color: #facc15;
        font-size: 14px;
      }

      .tips {
        margin-top: 8px;
        font-size: 14px;
        color: #cbd5e1;
        line-height: 1.6;
      }

      kbd {
        border: 1px solid #475569;
        background: #1e293b;
        border-radius: 6px;
        padding: 1px 6px;
        font-size: 12px;
      }

      .controls {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, 54px);
        justify-content: center;
        gap: 8px;
      }

      .controls button {
        padding: 10px 0;
        font-size: 18px;
      }

      .controls .blank {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <section class="game">
      <div class="hud">
        <div class="title">🐍 贪吃蛇</div>
        <div class="scores">
          <span>分数：<strong id="score">0</strong></span>
          <span>最高：<strong id="best">0</strong></span>
        </div>
      </div>

      <canvas id="board" width="480" height="480" aria-label="贪吃蛇游戏画布"></canvas>

      <div class="toolbar">
        <button id="startBtn" type="button">开始 / 重新开始</button>
        <button id="pauseBtn" type="button">暂停</button>
      </div>

      <p id="status" class="status">点击“开始”或按空格开始游戏。</p>

      <p class="tips">
        使用 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        控制方向。按 <kbd>空格</kbd> 暂停/继续。
      </p>

      <div class="controls" aria-label="触屏方向控制">
        <button class="blank" type="button" tabindex="-1">·</button>
        <button data-dir="up" type="button">↑</button>
        <button class="blank" type="button" tabindex="-1">·</button>
        <button data-dir="left" type="button">←</button>
        <button data-dir="down" type="button">↓</button>
        <button data-dir="right" type="button">→</button>
      </div>
    </section>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const scoreNode = document.getElementById("score");
      const bestNode = document.getElementById("best");
      const statusNode = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const controls = document.querySelectorAll(".controls button[data-dir]");

      const gridSize = 24;
      const tileSize = canvas.width / gridSize;

      let snake = [];
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let score = 0;
      let best = Number(localStorage.getItem("snake_best") || 0);
      let timer = null;
      let running = false;
      let paused = false;
      const gameSpeed = 110;

      bestNode.textContent = best;

      function initState() {
        snake = [
          { x: 12, y: 12 },
          { x: 11, y: 12 },
          { x: 10, y: 12 },
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        scoreNode.textContent = score;
        paused = false;
        spawnFood();
        draw();
      }

      function startGame() {
        initState();
        running = true;
        if (timer) {
          clearInterval(timer);
        }
        timer = setInterval(tick, gameSpeed);
        statusNode.textContent = "游戏中...";
        pauseBtn.textContent = "暂停";
      }

      function endGame() {
        running = false;
        clearInterval(timer);
        timer = null;
        statusNode.textContent = `游戏结束！本局得分 ${score}，按“开始”再来一局。`;
      }

      function togglePause() {
        if (!running) {
          return;
        }
        paused = !paused;
        pauseBtn.textContent = paused ? "继续" : "暂停";
        statusNode.textContent = paused ? "已暂停（按空格可继续）" : "游戏中...";
      }

      function updateBest() {
        if (score > best) {
          best = score;
          localStorage.setItem("snake_best", String(best));
          bestNode.textContent = best;
        }
      }

      function spawnFood() {
        while (true) {
          const candidate = {
            x: Math.floor(Math.random() * gridSize),
            y: Math.floor(Math.random() * gridSize),
          };
          const occupied = snake.some((s) => s.x === candidate.x && s.y === candidate.y);
          if (!occupied) {
            food = candidate;
            return;
          }
        }
      }

      function tick() {
        if (!running || paused) {
          return;
        }

        direction = nextDirection;

        const head = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y,
        };

        const hitWall = head.x < 0 || head.y < 0 || head.x >= gridSize || head.y >= gridSize;
        const hitSelf = snake.some((s) => s.x === head.x && s.y === head.y);

        if (hitWall || hitSelf) {
          updateBest();
          draw(true);
          endGame();
          return;
        }

        snake.unshift(head);

        const ateFood = head.x === food.x && head.y === food.y;
        if (ateFood) {
          score += 1;
          scoreNode.textContent = score;
          spawnFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function drawGrid() {
        ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
        ctx.lineWidth = 1;
        for (let i = 0; i <= gridSize; i++) {
          const p = i * tileSize;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * tileSize + 1, y * tileSize + 1, tileSize - 2, tileSize - 2);
      }

      function draw(crashed = false) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        drawCell(food.x, food.y, "#f87171");

        snake.forEach((segment, index) => {
          const color = crashed ? "#fb7185" : index === 0 ? "#4ade80" : "#22c55e";
          drawCell(segment.x, segment.y, color);
        });
      }

      function setDirection(x, y) {
        if (!running || paused) {
          return;
        }
        if (x === -nextDirection.x && y === -nextDirection.y) {
          return;
        }
        nextDirection = { x, y };
      }

      function handleDirectionKey(key) {
        switch (key) {
          case "arrowup":
          case "w":
            setDirection(0, -1);
            return true;
          case "arrowdown":
          case "s":
            setDirection(0, 1);
            return true;
          case "arrowleft":
          case "a":
            setDirection(-1, 0);
            return true;
          case "arrowright":
          case "d":
            setDirection(1, 0);
            return true;
          default:
            return false;
        }
      }

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();

        if (key === " ") {
          if (!running) {
            startGame();
          } else {
            togglePause();
          }
          event.preventDefault();
          return;
        }

        const handled = handleDirectionKey(key);
        if (handled) {
          event.preventDefault();
        }
      });

      startBtn.addEventListener("click", startGame);
      pauseBtn.addEventListener("click", togglePause);
      controls.forEach((button) => {
        button.addEventListener("click", () => {
          const dir = button.getAttribute("data-dir");
          if (dir === "up") setDirection(0, -1);
          if (dir === "down") setDirection(0, 1);
          if (dir === "left") setDirection(-1, 0);
          if (dir === "right") setDirection(1, 0);
        });
      });

      initState();
      statusNode.textContent = "点击“开始”或按空格开始游戏。";
    </script>
  </body>
</html>
